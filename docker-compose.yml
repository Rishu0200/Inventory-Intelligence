services:
  - type: web
    name: inventory-intelligence-api
    runtime: python
    plan: free

    # Use lean requirements (no PyTorch/sdv)
    buildCommand: pip install -r requirements-api.txt

    # $PORT is injected by Render automatically
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1

    # Render health check — keeps the service monitored
    healthCheckPath: /ping

    envVars:
      # ── LLM provider ──────────────────────────────────────────
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false      # Set this manually in Render dashboard

      # ── App settings ─────────────────────────────────────────
      - key: DEMO_MODE
        value: "false"
      - key: LOG_LEVEL
        value: INFO

      # ── ChromaDB ─────────────────────────────────────────────
      # Points to the committed chroma_store in the repo
      - key: CHROMA_STORE_PATH
        value: data/processed/chroma_store

      # ── MLflow (disabled in prod) ────────────────────────────
      - key: MLFLOW_TRACKING_URI
        value: ""
